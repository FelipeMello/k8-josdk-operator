apiVersion: v1
kind: ServiceAccount
metadata:
  name: josdk-operator
  namespace: operators

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: josdk-operator
rules:
# WebPage resources
- apiGroups: ["example.com"]
  resources: ["webpages"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["example.com"]
  resources: ["webpages/status"]
  verbs: ["get", "patch", "update"]
# ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Deployments
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: josdk-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: josdk-operator
subjects:
- kind: ServiceAccount
  name: josdk-operator
  namespace: operators

