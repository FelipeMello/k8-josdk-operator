apiVersion: apps/v1
kind: Deployment
metadata:
  name: josdk-operator
  namespace: operators
  labels:
    app: josdk-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: josdk-operator
  template:
    metadata:
      labels:
        app: josdk-operator
    spec:
      serviceAccountName: josdk-operator
      containers:
      - name: operator
        image: josdk-operator:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: JAVA_OPTS
          value: "-Xmx256m -Xms128m -XX:+UseG1GC"
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

