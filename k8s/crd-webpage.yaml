apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: webpages.example.com
spec:
  group: example.com
  names:
    kind: WebPage
    plural: webpages
    shortNames:
    - wp
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              html:
                type: string
                description: "HTML content for the web page"
              title:
                type: string
                description: "Title of the web page"
            required:
            - html
          status:
            type: object
            properties:
              ready:
                type: boolean
                description: "Whether the web page is ready"

